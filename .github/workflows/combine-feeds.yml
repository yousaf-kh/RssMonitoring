name: Combine RSS Feeds

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '23 */4 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.19'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build
        run: go build -v ./...

      - name: Generate combined feed
        run: |
          mkdir -p public
          go run rsscombine.go > public/combined.xml

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/combined.xml
          git diff --cached --quiet || (git commit -m "Update combined RSS feed" && git push)
